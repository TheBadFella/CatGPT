services:
  catgpt:
    build:
      context: .
      dockerfile: docker/Dockerfile
    image: catgpt-gateway
    container_name: catgpt
    restart: unless-stopped
    security_opt:
      - seccomp=unconfined
    shm_size: "2gb"
    command: ["/entrypoint.sh"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/healthz"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
    networks:
      - catgpt
    ports:
      - "8650:8000"
      - "6080:6080"
    environment:
      HEADLESS: "false"
      SLOW_MO: 50
      DISPLAY: ":99"
      DISPLAY_WIDTH: 1366
      DISPLAY_HEIGHT: 768
      DISPLAY_DEPTH: 24
      PROVIDER: "chatgpt"
      CHATGPT_URL: "https://chatgpt.com"
      CLAUDE_URL: "https://claude.ai"
      RESPONSE_TIMEOUT: 120000
      SELECTOR_TIMEOUT: 10000
      CHATGPT_MODEL_SWITCH_TIMEOUT: 10000
      TYPING_SPEED_MIN: 50
      TYPING_SPEED_MAX: 150
      THINKING_PAUSE_MIN: 1000
      THINKING_PAUSE_MAX: 3000
      API_HOST: "0.0.0.0"
      API_PORT: 8000
      API_TOKEN: ${CATGPT_API_KEY}
      API_TOKEN_OPTIONAL: "true"
      API_THREAD_CONTRACT_MODE: "true"
      API_THREAD_CONTRACT_TTL_SECONDS: 3600
      API_APP_THREAD_MODE: "true"
      API_APP_THREAD_TTL_SECONDS: 86400
      API_HEADER_ROW_MERGE_MODE: "true"
      OLLAMA_EMBEDDING_MODELS: "nomic-embed-text"
      OLLAMA_EMBEDDING_DIMENSIONS: 768
      OLLAMA_ACTIVE_MODEL_TTL_SECONDS: 900
      VNC_PASSWORD: ${CATGPT_VNC_PASSWORD}
      LOG_LEVEL: "DEBUG"
      VERBOSE: "true"
    volumes:
      - ${DOCKERDIR}/appdata/catgpt/browser:/app/browser_data
      - ${DOCKERDIR}/appdata/catgpt/logs:/app/logs

networks:
  catgpt:
    name: catgpt
